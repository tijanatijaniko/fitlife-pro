  .label { display: block; font-size: 13px; color: #8B7355; margin-bottom: 4px; }
  .page { min-height: 100vh; padding: 16px; padding-bottom: 80px; max-width: 600px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .tag { background: #E8DFD4; color: #5C4D3C; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }

  .exercise-row { background: #F9F6F2; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid #E8DFD4; }
  .exercise-row:hover { background: #F5F0E8; }
  .day-btn { padding: 10px 6px; border-radius: 10px; text-align: center; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }

  .day-btn.rest { background: white; color: #8B7355; border: 1px solid #E8DFD4; }

  .checkbox-option { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #E8DFD4; cursor: pointer; font-size: 13px; transition: all 0.2s; }

  .user-card { border: 1px solid #E8DFD4; border-radius: 10px; padding: 16px; background: #FAF7F2; margin-bottom: 12px; }

  const saved = localStorage.getItem("fitlife_admins");

}

function getAgeGroup(age) { return age<40?"young":age<55?"middle":"senior"; }
function getTrainingDays(freq) {
  const m={2:[0,3],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,3,4]};
  return m[freq]||[0,2,4];
}
function getWarmup(age,goal) {
  const ag=getAgeGroup(age);
  if(ag==="senior"||goal==="rehab") return ["march_in_place","arm_circles_warmup","hip_circles"];
  if(ag==="middle") return ["march_in_place","arm_circles_warmup","leg_swings","hip_circles"];
  return ["jumping_jacks","high_knees","arm_circles_warmup","leg_swings","hip_circles"];
}
function getStretching() { return ["quad_stretch","hamstring_stretch","hip_flexor_stretch","chest_stretch","shoulder_stretch","calf_stretch","spinal_twist"]; }
function getMainExercises(dayType,age,goal,problems) {
  const ag=getAgeGroup(age);
  const hasBack=problems.includes("ledja");
  const hasKnee=problems.includes("kolena")||problems.includes("zglobovi");
  if(goal==="rehab") {
    if(dayType==="lower") return hasKnee?["chair_sit_stand","glute_bridge","pelvic_tilt","cat_cow","bird_dog"]:["chair_sit_stand","glute_bridge","calf_raise","pelvic_tilt","bird_dog"];
    if(dayType==="upper") return ["wall_push_up","bird_dog","cat_cow","dead_bug","pelvic_tilt"];
    return ["chair_sit_stand","wall_push_up","glute_bridge","bird_dog","pelvic_tilt"];
  }
  if(ag==="senior") {
    if(dayType==="lower") return hasKnee?["chair_sit_stand","glute_bridge","calf_raise","pelvic_tilt","dead_bug"]:["chair_sit_stand","glute_bridge","squat","calf_raise","bird_dog"];
    if(dayType==="upper") return ["wall_push_up","bird_dog","dead_bug","plank","shoulder_press"];
    return ["chair_sit_stand","wall_push_up","glute_bridge","bird_dog","dead_bug"];
  }
  if(ag==="middle") {
    if(dayType==="lower") return hasBack?["squat","glute_bridge","bird_dog","calf_raise","pelvic_tilt"]:["squat","lunge","glute_bridge","hip_thrust","calf_raise","dead_bug"];
    if(dayType==="upper") return hasBack?["wall_push_up","rowing","shoulder_press","dead_bug","plank"]:["push_up","rowing","shoulder_press","bicep_curl","plank"];
    return hasBack?["squat","wall_push_up","glute_bridge","rowing","bird_dog","plank"]:["squat","push_up","hip_thrust","rowing","plank","mountain_climber"];
  }
  if(goal==="lose") {
    if(dayType==="lower") return hasKnee?["glute_bridge","hip_thrust","sumo_squat","dead_bug","mountain_climber","plank"]:["squat","lunge","sumo_squat","hip_thrust","calf_raise","mountain_climber"];
    if(dayType==="upper") return ["push_up","rowing","shoulder_press","mountain_climber","plank","russian_twist"];
    return ["squat","push_up","hip_thrust","rowing","mountain_climber","plank"];
  }
  if(goal==="muscle"||goal==="strength") {
    if(dayType==="lower") return hasKnee?["hip_thrust","glute_bridge","rdl","dead_bug","plank"]:["squat","lunge","rdl","hip_thrust","sumo_squat","calf_raise"];
    if(dayType==="upper") return ["push_up","rowing","shoulder_press","bicep_curl","tricep_dip","plank"];
    return ["squat","push_up","rdl","rowing","shoulder_press","plank"];
  }
  if(goal==="cardio") {
    if(dayType==="lower") return ["squat","lunge","mountain_climber","calf_raise","russian_twist","crunch"];
    if(dayType==="upper") return ["push_up","mountain_climber","plank","russian_twist","shoulder_press"];
    return ["squat","push_up","mountain_climber","lunge","plank","crunch"];
  }
  if(dayType==="lower") return ["squat","glute_bridge","lunge","hip_thrust","calf_raise","plank"];
  if(dayType==="upper") return ["push_up","rowing","shoulder_press","dead_bug","plank","crunch"];
  return ["squat","push_up","hip_thrust","rowing","plank","dead_bug"];
}
function getCardio(goal,age) {
  const ag=getAgeGroup(age);
  if(goal==="rehab"||ag==="senior") return "5-10 minuta laganog hodanja";
  if(goal==="cardio") return "15-20 minuta: trčanje, brzo hodanje, ili bicikl";
  if(goal==="lose") return "10-15 minuta: brzo hodanje ili lagan jogging";
  if(goal==="muscle"||goal==="strength") return "5 minuta laganog hodanja (opciono)";
  return "10 minuta hodanja srednje brzine";
}

function calculateMacros(profile) {
  const {age,weight,height,goal,activity,bodyType,gender}=profile;
  // Mifflin-St Jeor
  let bmr = gender==="male"
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161;
  const m={sed:1.2,low:1.375,med:1.55,high:1.725};
  let tdee = bmr * (m[activity]||1.4);
  // Goal deficit/surplus
  if(goal==="lose") tdee -= 500;
  else if(goal==="muscle") tdee += 250;
  else if(goal==="strength") tdee += 200;
  if(bodyType==="endo"&&goal==="lose") tdee -= 100;
  if(bodyType==="ecto"&&goal==="muscle") tdee += 150;
  // Minimumi — medicinski standard
  const minKcal = gender==="male" ? 1500 : 1200;
  const kcal = Math.max(Math.round(tdee), minKcal);
  // Macros: proteini 2g/kg, masti 0.8g/kg, ostatak ugljeni hidrati
  const prot = Math.round(weight * 2);
  const fat  = Math.round(weight * 0.8);
  const carbKcal = Math.max(kcal - prot*4 - fat*9, 0);
  const carb = Math.round(carbKcal / 4);
  return {kcal, prot, carb, fat};
}

,marginBottom:'24px'}} />
      <div className="card" style={{width:"100%",maxWidth:"360px"}}>
        <h2 style={{fontSize:"18px",fontWeight:"600",color:"#5C4D3C",marginBottom:"20px",textAlign:"center"}}>{authMode==="login"?t.loginTitle:t.registerTitle}</h2>
        <div style={{marginBottom:"12px"}}><label className="label">{t.username}</label><input className="input-field" value={authUsername} onChange={e=>setAuthUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(authMode==="login"?handleLogin():handleRegister())} /></div>
        <div style={{marginBottom:"12px"}}><label className="label">{t.password}</label><input className="input-field" type="password" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(authMode==="login"?handleLogin():handleRegister())} /></div>
        {authMode==="register"&&<div style={{marginBottom:"12px"}}><label className="label">{t.confirmPass}</label><input className="input-field" type="password" value={authConfirm} onChange={e=>setAuthConfirm(e.target.value)} /></div>}
        {authError&&<p className="error-msg">{authError}</p>}
        <button className="btn-primary" style={{width:"100%",marginTop:"16px"}} onClick={authMode==="login"?handleLogin:handleRegister}>{authMode==="login"?t.loginBtn:t.registerBtn}</button>
        <p style={{textAlign:"center",fontSize:"13px",color:"#8B7355",marginTop:"12px"}}>
          {authMode==="login"?t.noAccount:t.hasAccount}{" "}
          <span style={{cursor:"pointer",fontWeight:"600",textDecoration:"underline"}} onClick={()=>{setAuthMode(authMode==="login"?"register":"login");setAuthError("");}}>{authMode==="login"?t.registerBtn:t.loginBtn}</span>
        </p>
      </div>
      <button style={{marginTop:"12px",color:"#8B7355",background:"none",border:"none",cursor:"pointer"}} onClick={()=>setScreen("welcome")}>← {t.backBtn}</button>
    </div>
  );

  if(screen==="motiv") {
    const qs=[{q:t.motivQ1,a:[t.motivA1_1,t.motivA1_2,t.motivA1_3]},{q:t.motivQ2,a:[t.motivA2_1,t.motivA2_2,t.motivA2_3]},{q:t.motivQ3,a:[t.motivA3_1,t.motivA3_2,t.motivA3_3]}];
    const score=motivAnswers.reduce((a,b)=>a+b,0);
    return (
      <div style={{minHeight:"100vh",background:"#FAF7F2",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
        <div className="card" style={{width:"100%",maxWidth:"480px"}}>
          <h2 style={{fontSize:"20px",fontWeight:"600",color:"#5C4D3C",marginBottom:"20px",textAlign:"center"}}>{t.motivTitle}</h2>
          {qs.map((item,qi)=>(
            <div key={qi} style={{marginBottom:"20px"}}>
              <p style={{fontWeight:"500",color:"#5C4D3C",marginBottom:"10px"}}>{qi+1}. {item.q}</p>
              {item.a.map((ans,ai)=>(
                <div key={ai} className={`radio-option${motivAnswers[qi]===ai+1?" selected":""}`} onClick={()=>setMotivAnswers(prev=>{const n=[...prev];n[qi]=ai+1;return n;})}>
                  <input type="radio" readOnly checked={motivAnswers[qi]===ai+1} style={{accentColor:"#8B7355"}} />
                  <span style={{fontSize:"14px"}}>{ans}</span>
                </div>
              ))}
            </div>
          ))}
          {motivAnswers.every(a=>a>0)&&(
            <div style={{background:"#F5F0E8",borderRadius:"10px",padding:"14px",textAlign:"center",marginBottom:"16px"}}>
              <p style={{fontSize:"13px",color:"#8B7355"}}>{t.motivResult}: <strong style={{color:"#5C4D3C"}}>{score}/9</strong></p>
              <p style={{fontSize:"13px",color:"#8B7355",marginTop:"4px"}}>{score<=3?t.motivLow:score<=6?t.motivMed:t.motivHigh}</p>
            </div>
          )}
          <div style={{display:"flex",gap:"10px"}}>
            <button className="btn-outline" style={{flex:1}} onClick={()=>setScreen("auth")}>{t.backBtn}</button>
            <button className="btn-primary" style={{flex:1}} disabled={!motivAnswers.every(a=>a>0)} onClick={()=>setScreen("form")}>{t.nextBtn}</button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==="form") return (
    <div className="page">
      <h1 style={{fontSize:"22px",fontWeight:"600",color:"#5C4D3C",marginBottom:"20px",textAlign:"center"}}>{t.formTitle}</h1>
      <div className="card">
        <div className="section-title">{t.ctPersonal}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div style={{gridColumn:"1/-1"}}><label className="label">{t.lName} *</label><input className="input-field" value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})} /></div>
          <div style={{gridColumn:"1/-1"}}>
            <label className="label">{t.lGender} *</label>
            <div style={{display:"flex",gap:"10px",marginTop:"6px"}}>
              {[["female",t.genderFemale],["male",t.genderMale]].map(([v,lbl])=>(
                <div key={v} className={`radio-option${formData.gender===v?" selected":""}`} style={{flex:1,justifyContent:"center"}} onClick={()=>setFormData({...formData,gender:v})}>
                  <input type="radio" readOnly checked={formData.gender===v} style={{accentColor:"#8B7355"}} /><span style={{fontSize:"14px"}}>{lbl}</span>
                </div>
              ))}
            </div>
          </div>
          {[[t.lAge,"age"],[t.lHeight,"height"],[t.lWeight,"weight"],[t.lGoalWeight,"goalWeight"]].map(([lbl,key])=>(
            <div key={key}><label className="label">{lbl}{key!=="goalWeight"?" *":""}</label><input className="input-field" type="number" value={formData[key]} onChange={e=>setFormData({...formData,[key]:e.target.value})} /></div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="section-title">{t.ctGoals}</div>
        {[[t.lGoal,"goal",[[t.goalLose,"lose"],[t.goalMuscle,"muscle"],[t.goalMaintain,"maintain"],[t.goalStrength,"strength"],[t.goalCardio,"cardio"],[t.goalRehab,"rehab"]]],[t.lFreq,"frequency",[[t.freq2,"2"],[t.freq3,"3"],[t.freq4,"4"],[t.freq5,"5"]]],[t.lAct,"activity",[[t.oSed,"sed"],[t.oLow,"low"],[t.oMed,"med"],[t.oHigh,"high"]]],[t.lEq,"equipment",[[t.oNone,"none"],[t.oHome,"home"],[t.oGym,"gym"],[t.oPilates,"pilates"]]]].map(([lbl,key,opts])=>(
          <div key={key} style={{marginBottom:"14px"}}><label className="label">{lbl}</label><select className="input-field" value={formData[key]} onChange={e=>setFormData({...formData,[key]:e.target.value})}>{opts.map(([o,v])=><option key={v} value={v}>{o}</option>)}</select></div>
        ))}
      </div>
      <div className="card">
        <div className="section-title">{t.ctBody}</div>
        {[[t.lBodyType,"bodyType",[[t.bodyEcto,"ecto"],[t.bodyMeso,"meso"],[t.bodyEndo,"endo"]]],[t.lSleep,"sleepQuality",[[t.sleepBad,"bad"],[t.sleepOk,"ok"],[t.sleepGood,"good"]]],[t.lStress,"stressLevel",[[t.stressLow,"low"],[t.stressMed,"med"],[t.stressHigh,"high"]]],[t.lWater,"waterIntake",[[t.waterLow,"low"],[t.waterMed,"med"],[t.waterHigh,"high"]]]].map(([lbl,key,opts])=>(
          <div key={key} style={{marginBottom:"14px"}}><label className="label">{lbl}</label><select className="input-field" value={formData[key]} onChange={e=>setFormData({...formData,[key]:e.target.value})}>{opts.map(([o,v])=><option key={v} value={v}>{o}</option>)}</select></div>
        ))}
      </div>
      <div className="card">
        <div className="section-title">{t.ctProblems}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"14px"}}>
          {TELO.map(([lbl,val])=>(
            <div key={val} className={`checkbox-option${selTelo.includes(val)?" selected":""}`} onClick={()=>setSelTelo(prev=>prev.includes(val)?prev.filter(x=>x!==val):[...prev,val])}>
              <input type="checkbox" readOnly checked={selTelo.includes(val)} style={{accentColor:"#8B7355"}} />{lbl}
            </div>
          ))}
        </div>
        <div style={{marginBottom:"12px"}}><label className="label">{t.lInjuries}</label><input className="input-field" value={formData.injuries} onChange={e=>setFormData({...formData,injuries:e.target.value})} placeholder="npr. povreda kolena..." /></div>
        <div><label className="label">{t.lAllerg}</label><input className="input-field" value={formData.allergies} onChange={e=>setFormData({...formData,allergies:e.target.value})} placeholder="npr. gluten, laktoza..." /></div>
      </div>
      <div className="card">
        <div className="section-title">{t.ctFace}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
          {LICE.map(([lbl,val])=>(
            <div key={val} className={`checkbox-option${selLice.includes(val)?" selected":""}`} onClick={()=>setSelLice(prev=>prev.includes(val)?prev.filter(x=>x!==val):[...prev,val])}>
              <input type="checkbox" readOnly checked={selLice.includes(val)} style={{accentColor:"#8B7355"}} />{lbl}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <label className="label">{t.lNote}</label>
        <textarea className="input-field" value={formData.notes} onChange={e=>setFormData({...formData,notes:e.target.value})} rows={3} />
      </div>
      {formError&&<p className="error-msg" style={{marginBottom:"12px"}}>{formError}</p>}
      <div style={{display:"flex",gap:"10px"}}>
        <button className="btn-outline" style={{flex:1}} onClick={()=>setScreen("motiv")}>{t.backBtn}</button>
        <button className="btn-primary" style={{flex:1}} onClick={handleFormSubmit}>{t.btnGen}</button>
      </div>
    </div>
  );

  if(screen==="results"&&currentUser&&macros) {
    const goalNames={lose:t.goalLose,muscle:t.goalMuscle,maintain:t.goalMaintain,strength:t.goalStrength,cardio:t.goalCardio,rehab:t.goalRehab};
    return (
      <div className="page">
        <header className="header">
          <div><p style={{fontSize:"12px",color:"#8B7355"}}>{t.profile}</p><h1 style={{fontSize:"18px",fontWeight:"600",color:"#5C4D3C"}}>{currentUser.name}</h1></div>
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <select value={lang} onChange={e=>setLang(e.target.value)} style={{border:"1px solid #E8DFD4",borderRadius:"6px",padding:"4px 8px",fontSize:"12px",color:"#5C4D3C",background:"white"}}><option value="sr">SR</option><option value="en">EN</option></select>
            <button style={{fontSize:"13px",color:"#C97064",background:"none",border:"none",cursor:"pointer"}} onClick={handleLogout}>{t.logout}</button>
          </div>
        </header>
        <div className="card">
          <h2 style={{fontWeight:"600",color:"#5C4D3C",marginBottom:"4px"}}>{t.macroTitle}</h2>
          <p style={{fontSize:"13px",color:"#8B7355",marginBottom:"14px"}}>{goalNames[currentUser.goal]}</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px"}}>
            {[[macros.kcal,"",t.muKcal],[macros.prot,"g",t.muProt],[macros.carb,"g",t.muCarb],[macros.fat,"g",t.muFat]].map(([val,unit,lbl],i)=>(
              <div key={i} className="macro-box"><div className="macro-num">{val}{unit}</div><div className="macro-lbl">{lbl}</div></div>
            ))}
          </div>
        </div>
        <div className="card">
          <h2 style={{fontWeight:"600",color:"#5C4D3C",marginBottom:"14px"}}>{t.daysTitle}</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"6px"}}>
            {t.tLabels.map((day,i)=>{const isTr=trainingDays.includes(i);return(
              <button key={i} className={`day-btn ${isTr?"training":"rest"}`} onClick={()=>{setSelectedDay(i);setScreen("day");}}>
                <div style={{fontSize:"10px",fontWeight:"600"}}>{day.slice(0,3)}</div>
                <div style={{fontSize:"16px",marginTop:"4px"}}>{isTr?"T":"O"}</div>
              </button>
            );})}
          </div>
          <div style={{display:"flex",gap:"16px",marginTop:"10px",fontSize:"12px",color:"#8B7355"}}>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"12px",height:"12px",background:"#8B7355",borderRadius:"3px",display:"inline-block"}}></span>{t.treningDan}</span>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"12px",height:"12px",background:"white",border:"1px solid #E8DFD4",borderRadius:"3px",display:"inline-block"}}></span>{t.odmorDan}</span>
          </div>
        </div>
        <button className="btn-primary" style={{width:"100%",marginBottom:"10px"}} onClick={()=>setScreen("progress")}>{t.progressTitle}</button>
        <button className="btn-outline" style={{width:"100%"}} onClick={()=>{setScreen("form");setAuthMode("register");}}>{t.btnBackForm}</button>
      </div>
    );
  }

  if(screen==="progress"&&currentUser) return (
    <div className="page">
      <header className="header">
        <button style={{color:"#8B7355",background:"none",border:"none",cursor:"pointer"}} onClick={()=>setScreen("results")}>← {t.backBtn}</button>
        <h1 style={{fontSize:"16px",fontWeight:"600",color:"#5C4D3C"}}>{t.progressTitle}</h1>
        <div/>
      </header>
      <div className="card">
        <div className="section-title">{t.addProgress}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
          {[[t.progressWeight,"weight"],[t.progressWaist,"waist"],[t.progressHips,"hips"],[t.progressChest,"chest"],[t.progressArms,"arms"],[t.progressThighs,"thighs"],[t.progressSleep,"sleepQuality"],[t.progressEnergy,"energyLevel"]].map(([lbl,key])=>(
            <div key={key}><label className="label">{lbl}</label><input className="input-field" type="number" value={newProgress[key]||""} onChange={e=>setNewProgress({...newProgress,[key]:parseFloat(e.target.value)||undefined})} /></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
          <div><label className="label">{t.progressPhoto} ({t.progressBefore})</label><input type="file" accept="image/*" onChange={e=>handlePhotoUpload('before',e)} style={{fontSize:"13px",width:"100%"}} />{newProgress.photoBefore&&<img src={newProgress.photoBefore} alt="Before" style={{marginTop:"8px",width:"100%",height:"100px",objectFit:"cover",borderRadius:"8px"}} />}</div>
          <div><label className="label">{t.progressPhoto} ({t.progressAfter})</label><input type="file" accept="image/*" onChange={e=>handlePhotoUpload('after',e)} style={{fontSize:"13px",width:"100%"}} />{newProgress.photoAfter&&<img src={newProgress.photoAfter} alt="After" style={{marginTop:"8px",width:"100%",height:"100px",objectFit:"cover",borderRadius:"8px"}} />}</div>
        </div>
        <div style={{marginBottom:"14px"}}><label className="label">{t.progressNotes}</label><textarea className="input-field" value={newProgress.notes||""} onChange={e=>setNewProgress({...newProgress,notes:e.target.value})} rows={2} /></div>
        <button className="btn-primary" style={{width:"100%"}} onClick={handleSaveProgress}>{t.saveProgress}</button>
      </div>
      <div className="card">
        <div className="section-title">{t.progressHistory}</div>
        {progressEntries.length===0?<p style={{color:"#8B7355",textAlign:"center"}}>{t.noProgress}</p>:(
          progressEntries.map((entry,i)=>(
            <div key={i} style={{border:"1px solid #E8DFD4",borderRadius:"10px",padding:"14px",marginBottom:"10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                <span style={{fontWeight:"600",color:"#5C4D3C"}}>{entry.date}</span>
                <button style={{color:"#C97064",background:"none",border:"none",cursor:"pointer",fontSize:"13px"}} onClick={()=>handleDeleteProgress(i)}>{t.deleteEntry}</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px",fontSize:"13px"}}>
                {entry.weight&&<span><b>Tež:</b> {entry.weight}kg</span>}
                {entry.waist&&<span><b>Struk:</b> {entry.waist}cm</span>}
                {entry.hips&&<span><b>Kukovi:</b> {entry.hips}cm</span>}
                {entry.chest&&<span><b>Grudi:</b> {entry.chest}cm</span>}
                {entry.arms&&<span><b>Ruke:</b> {entry.arms}cm</span>}
                {entry.thighs&&<span><b>Butine:</b> {entry.thighs}cm</span>}
                {entry.sleepQuality&&<span><b>San:</b> {entry.sleepQuality}/10</span>}
                {entry.energyLevel&&<span><b>Energija:</b> {entry.energyLevel}/10</span>}
              </div>
              {entry.notes&&<p style={{fontSize:"13px",color:"#8B7355",marginTop:"6px"}}>{entry.notes}</p>}
              {(entry.photoBefore||entry.photoAfter)&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"8px"}}>
                  {entry.photoBefore&&<img src={entry.photoBefore} alt="Pre" style={{width:"100%",height:"90px",objectFit:"cover",borderRadius:"8px"}} />}
                  {entry.photoAfter&&<img src={entry.photoAfter} alt="Posle" style={{width:"100%",height:"90px",objectFit:"cover",borderRadius:"8px"}} />}
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );

  if(screen==="admin"&&isAdmin) {
    const admins=getAdmins();
    return (

                        <p>Cilj: {user.goal} | Aktivnost: {user.activity}</p>
                        {user.allergies&&<p>Alergije: {user.allergies}</p>}
                        {user.injuries&&<p>Povrede: {user.injuries}</p>}
                      </div>
                    </div>
                    <button className="btn-primary" style={{fontSize:"12px",padding:"6px 12px"}} onClick={()=>{setSelectedAdminUser(user.username);setScreen("adminUser");}}>{t.adminViewProgress}</button>
                  </div>
                </div>
              ))
            )}
          </div>
        )}

        {adminTab==="settings"&&(
          <div>
            {settingsMsg==="pass_ok"&&<p className="success-msg" style={{marginBottom:"12px"}}>✓ {t.adminPassChanged}</p>}
            {settingsMsg==="user_ok"&&<p className="success-msg" style={{marginBottom:"12px"}}>✓ {t.adminUsernameChanged}</p>}
            {settingsMsg==="error"&&<p className="error-msg" style={{marginBottom:"12px"}}>✗ {t.adminPassError}</p>}

            <div className="admin-settings-box">
              <div className="section-title">🔑 {t.adminSavePass}</div>
              <div style={{marginBottom:"10px"}}><label className="label">{t.adminCurrentPass}</label><input className="input-field" type="password" value={currPass} onChange={e=>setCurrPass(e.target.value)} /></div>
              <div style={{marginBottom:"10px"}}><label className="label">{t.adminNewPass}</label><input className="input-field" type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} /></div>
              <div style={{marginBottom:"14px"}}><label className="label">{t.adminConfirmNewPass}</label><input className="input-field" type="password" value={confNewPass} onChange={e=>setConfNewPass(e.target.value)} /></div>
              <button className="btn-primary" style={{width:"100%"}} onClick={handleChangePassword}>{t.adminSavePass}</button>
            </div>

            <div className="admin-settings-box">
              <div className="section-title">👤 {t.adminChangeUsername}</div>
              <p style={{fontSize:"13px",color:"#8B7355",marginBottom:"10px"}}>Trenutno: <strong>{adminUsername}</strong></p>
              <div style={{marginBottom:"14px"}}><label className="label">{t.adminNewUsername}</label><input className="input-field" value={newAdminUsername} onChange={e=>setNewAdminUsername(e.target.value)} /></div>
              <button className="btn-primary" style={{width:"100%"}} onClick={handleChangeAdminUsername}>{t.adminSaveUsername}</button>
            </div>

            <div className="card" style={{background:"#FFF8F0"}}>
              <div className="section-title">ℹ️ Admin nalozi</div>
              <p style={{fontSize:"13px",color:"#8B7355",lineHeight:"1.6"}}>
                U aplikaciji postoje <strong>2 admin naloga</strong>. Svaki admin može nezavisno promeniti sopstveno korisničko ime i lozinku.<br/><br/>
                Podrazumevani podaci za prijavu:<br/>
                • <strong>admin1</strong> / fitlife2024<br/>
                • <strong>admin2</strong> / fitlife2024<br/><br/>
                <em>Preporučujemo da odmah promenite lozinke!</em>
              </p>
            </div>
          </div>
        )}
      </div>
    );
  }

  if(screen==="adminUser"&&isAdmin&&selectedAdminUser) {
    const user=allUsers.find(u=>u.username===selectedAdminUser);
    const prog=allProgress[selectedAdminUser]||[];
    return (
      <div className="page">
        <header className="header">
          <button style={{color:"#8B7355",background:"none",border:"none",cursor:"pointer"}} onClick={()=>setScreen("admin")}>← {t.adminBack}</button>
          <h1 style={{fontSize:"16px",fontWeight:"600",color:"#5C4D3C"}}>{user?.name}</h1>
          <div/>
        </header>
        {user&&<>
          <div className="card">
            <div className="section-title">{t.adminUserInfo}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",fontSize:"13px",color:"#5C4D3C"}}>
              <p><span style={{color:"#8B7355"}}>Korisničko ime:</span> {user.username}</p>
              <p><span style={{color:"#8B7355"}}>Pol:</span> {user.gender==="male"?"Muški":"Ženski"}</p>
              <p><span style={{color:"#8B7355"}}>Godine:</span> {user.age}</p>
              <p><span style={{color:"#8B7355"}}>Visina:</span> {user.height} cm</p>
              <p><span style={{color:"#8B7355"}}>Težina:</span> {user.weight} kg</p>
              <p><span style={{color:"#8B7355"}}>Ciljna tež:</span> {user.goalWeight} kg</p>
              <p><span style={{color:"#8B7355"}}>Cilj:</span> {user.goal}</p>
              <p><span style={{color:"#8B7355"}}>Tip tela:</span> {user.bodyType}</p>
              <p style={{gridColumn:"1/-1"}}><span style={{color:"#8B7355"}}>Alergije:</span> {user.allergies||"Nema"}</p>
              <p style={{gridColumn:"1/-1"}}><span style={{color:"#8B7355"}}>Povrede:</span> {user.injuries||"Nema"}</p>
            </div>
          </div>
          <div className="card">
            <div className="section-title">{t.adminMeasurements} ({prog.length})</div>
            {prog.length===0?<p style={{color:"#8B7355",textAlign:"center"}}>{t.noProgress}</p>:(
              prog.map((entry,i)=>(
                <div key={i} style={{border:"1px solid #E8DFD4",borderRadius:"10px",padding:"14px",marginBottom:"10px",background:"#FAF7F2"}}>
                  <p style={{fontWeight:"600",color:"#5C4D3C",marginBottom:"8px"}}>{entry.date}</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px",fontSize:"12px"}}>
                    {entry.weight&&<span>Tež: {entry.weight}kg</span>}
                    {entry.waist&&<span>Struk: {entry.waist}cm</span>}
                    {entry.hips&&<span>Kukovi: {entry.hips}cm</span>}
                    {entry.chest&&<span>Grudi: {entry.chest}cm</span>}
                    {entry.arms&&<span>Ruke: {entry.arms}cm</span>}
                    {entry.thighs&&<span>Butine: {entry.thighs}cm</span>}
                    {entry.sleepQuality&&<span>San: {entry.sleepQuality}/10</span>}
                    {entry.energyLevel&&<span>Energija: {entry.energyLevel}/10</span>}
                  </div>
                  {entry.notes&&<p style={{fontSize:"12px",color:"#8B7355",marginTop:"6px"}}>{entry.notes}</p>}
                  {(entry.photoBefore||entry.photoAfter)&&(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"8px"}}>
                      {entry.photoBefore&&<div><p style={{fontSize:"11px",color:"#8B7355"}}>Pre:</p><img src={entry.photoBefore} alt="Pre" style={{width:"100%",height:"120px",objectFit:"cover",borderRadius:"8px"}} /></div>}
                      {entry.photoAfter&&<div><p style={{fontSize:"11px",color:"#8B7355"}}>Posle:</p><img src={entry.photoAfter} alt="Posle" style={{width:"100%",height:"120px",objectFit:"cover",borderRadius:"8px"}} /></div>}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>
        </>}
      </div>
    );
  }

  if(screen==="day"&&currentUser&&selectedDay!==null) {
    const training=getTraining(selectedDay);
    const isTrainingDay=training!==null;
    const meals=getMeals(currentUser,selectedDay);
    return (
      <div className="page">
        <header className="header">
          <button style={{color:"#8B7355",background:"none",border:"none",cursor:"pointer"}} onClick={()=>setScreen("results")}>← {t.btnBackDays}</button>
          <h1 style={{fontSize:"16px",fontWeight:"600",color:"#5C4D3C"}}>{t.tLabels[selectedDay]}</h1>
          <div/>
        </header>
        {isTrainingDay&&training?(
          <div>
            <div className="card">
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"}}>
                <span className="tag">{t.tCard}</span>
                <span style={{fontWeight:"600",color:"#5C4D3C"}}>{training.naziv}</span>
              </div>
              <div style={{background:"#F5F0E8",borderRadius:"10px",padding:"12px",marginBottom:"14px"}}>
                <p style={{fontSize:"12px",fontWeight:"600",color:"#8B7355"}}>{t.trainingGoal}</p>
                <p style={{fontSize:"13px",color:"#5C4D3C",marginTop:"2px"}}>{training.cilj}</p>
              </div>
              <h4 style={{fontWeight:"600",fontSize:"13px",color:"#5C4D3C",marginBottom:"8px"}}>{t.warmup} (5-7 min)</h4>
              {training.warmup.map((v,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",background:"#F9F6F2",borderRadius:"8px",padding:"10px",marginBottom:"6px",fontSize:"13px"}}>
                  <span>{v.naziv}</span><span style={{color:"#8B7355"}}>{v.serije}</span>
                </div>
              ))}
              <h4 style={{fontWeight:"600",fontSize:"13px",color:"#5C4D3C",margin:"14px 0 4px"}}>{t.mainPart}</h4>
              <p style={{fontSize:"12px",color:"#8B7355",marginBottom:"8px"}}>{t.tempo}: {training.tempo}</p>
              {training.main.map((v,i)=>(
                <div key={i} className="exercise-row" onClick={()=>setShowExercise(showExercise===v.naziv?null:v.naziv)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:"500",fontSize:"14px"}}>{v.naziv}</span>
                    <span style={{color:"#8B7355",fontSize:"13px"}}>{v.serije}</span>
                  </div>
                  <div style={{fontSize:"12px",color:"#8B7355",marginTop:"2px"}}>{v.odmor}</div>
                  {showExercise===v.naziv&&(
                    <div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid #E8DFD4",fontSize:"13px",color:"#5C4D3C",lineHeight:"1.6"}}>
                      <p>{v.opis}</p>
                      {v.tempo&&<p style={{fontSize:"12px",color:"#8B7355",marginTop:"4px"}}>{t.tempo}: {v.tempo}</p>}
                    </div>
                  )}
                </div>
              ))}
              <div style={{background:"#FAF7F2",borderRadius:"10px",padding:"12px",margin:"14px 0"}}>
                <h4 style={{fontWeight:"600",fontSize:"13px",color:"#5C4D3C",marginBottom:"4px"}}>{t.cardioAfter}</h4>
                <p style={{fontSize:"13px",color:"#8B7355"}}>{training.cardio}</p>
              </div>
              <h4 style={{fontWeight:"600",fontSize:"13px",color:"#5C4D3C",marginBottom:"8px"}}>{t.stretching} (5-10 min)</h4>
              <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                {training.stretching.map((v,i)=><span key={i} style={{fontSize:"12px",background:"#F5F0E8",color:"#5C4D3C",padding:"4px 10px",borderRadius:"16px"}}>{v.naziv}</span>)}
              </div>
            </div>
          </div>
        ):(
          <div className="card" style={{textAlign:"center"}}>
            <h2 style={{fontSize:"18px",fontWeight:"600",color:"#5C4D3C",marginBottom:"8px"}}>{t.odmor}</h2>
            <p style={{color:"#8B7355",marginBottom:"14px",fontSize:"14px"}}>{t.odmorNote}</p>
            <div style={{background:"#F5F0E8",borderRadius:"10px",padding:"14px",textAlign:"left"}}>
              <p style={{fontSize:"13px",fontWeight:"600",color:"#5C4D3C",marginBottom:"8px"}}>Preporuke za dan odmora:</p>
              {["Lagana šetnja 20-30 minuta","Istezanje ili joga","Dovoljno sna (7-9 sati)","Hidratacija (2+ litra vode)"].map((item,i)=>(
                <p key={i} style={{fontSize:"13px",color:"#8B7355",marginBottom:"4px"}}>• {item}</p>
              ))}
            </div>
          </div>
        )}
        {meals&&(
          <div className="card" style={{marginTop:"0"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"}}><span className="tag">{t.iCard}</span></div>
            {[[t.dorucak,meals.dorucak],[t.uzina1,meals.uzina1],[t.rucak,meals.rucak],[t.uzina2,meals.uzina2],[t.vecera,meals.vecera]].map(([lbl,val])=>(
              <div key={lbl} className="meal-block">
                <h4>{lbl}</h4>
                <p style={{fontSize:"13px",color:"#5C4D3C",whiteSpace:"pre-line",lineHeight:"1.6"}}>{val}</p>
              </div>
            ))}
            {currentUser.allergies&&<div style={{background:"#FFF0F0",borderRadius:"8px",padding:"10px",marginTop:"10px"}}><p style={{fontSize:"12px",color:"#C97064"}}>Napomena: Proverite sastojke prema vašim alergijama ({currentUser.allergies})</p></div>}
          </div>
        )}
        <p style={{fontSize:"12px",textAlign:"center",color:"#8B7355",marginTop:"8px"}}>{t.dayNote}</p>
      </div>
    );
  }

  return null;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered');
    }).catch(function(err) {
      console.log('SW failed: ', err);
    });
  });
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'flex';
});

function installApp() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((result) => {
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    });
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
});
</script>

<div id="install-btn" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#8B7355;color:white;padding:12px 24px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(139,115,85,0.4);align-items:center;gap:8px;font-family:-apple-system,sans-serif;" onclick="installApp()">
  📲 Dodaj na početni ekran
</div>
</body>
</html>
